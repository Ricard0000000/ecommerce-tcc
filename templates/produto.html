{% extends 'base.html' %}

{% block title %}{{ produto.nome }}{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <!-- IMAGEM -->
        <div class="col-md-6">

            {% if produto.imagem %}
                <img src="{{ produto.imagem.url }}"
                     class="img-fluid rounded">
            {% endif %}

        </div>

        <!-- INFO -->
        <div class="col-md-6">

            <h2>{{ produto.nome }}</h2>

            <p class="text-muted">
                <a href="/categoria/{{ produto.categoria.id }}/"
                   class="categoria-link">
                    {{ produto.categoria }}
                </a>
            </p>

            <h4 class="text-success">
                R$ {{ produto.preco }}
            </h4>

            <hr>

            <p>
                {{ produto.descricao }}
            </p>

            <hr>

            <!-- BOTÃO AJAX -->
            <button
                class="btn btn-primary w-100"
                id="addCarrinhoBtn"
                data-id="{{ produto.id }}">

                🛒 Adicionar ao carrinho

            </button>

            <!-- VOLTAR -->
            <a href="/"
               class="btn btn-outline-secondary w-100 mt-2">

                Voltar

            </a>

        </div>

    </div>

</div>

<script>

document.getElementById('addCarrinhoBtn')
.addEventListener('click', function () {

    let produtoId = this.dataset.id;

    fetch(`/carrinho/ajax/add/${produtoId}/`)
    .then(response => response.json())
    .then(data => {

        // atualiza contador
        document.querySelector('.carrinho-count').innerText =
            data.total_itens;

        // atualiza texto modal
        document.getElementById('modalMensagem').innerText =
            data.message;

        // abre modal
        let modal = new bootstrap.Modal(
            document.getElementById('mensagemModal')
        );

        modal.show();

        setTimeout(() => {
            modal.hide();
        }, 1800);

    });

});

</script>

{% endblock %}
