{% extends 'base.html' %}

{% block title %}Checkout - Bonsai Garden{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">
                        📦 Checkout
                    </h2>

        <form method="POST" action="{% url 'finalizar_pedido' %}">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Nome completo</label>
                                <input type="text"
                                       name="nome_cliente"
                                       class="form-control border-secondary-subtle bg-light"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Telefone</label>
                                <input type="text"
                                       name="telefone"
                                       class="form-control border-secondary-subtle bg-light"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">CEP</label>
                                <input type="text"
                                       name="cep"
                                       class="form-control border-secondary-subtle bg-light"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Cidade</label>
                                <input type="text"
                                       name="cidade"
                                       class="form-control border-secondary-subtle bg-light"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Número</label>
                                <input type="text"
                                       name="numero"
                                       class="form-control border-secondary-subtle bg-light"
                                       required>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Endereço</label>
                                <input type="text"
                                       name="endereco"
                                       class="form-control border-secondary-subtle bg-light"
                                       required>
                            </div>

                            <div class="col-md-12 mb-4">
                                <label class="form-label fw-bold">Complemento</label>
                                <input type="text"
                                       name="complemento"
                                       class="form-control border-secondary-subtle bg-light">
                            </div>

                        </div>

                        <div class="bg-light p-4 rounded-4 mb-4">

                            <h5 class="fw-bold mb-3">
                                🛒 Resumo do Pedido
                            </h5>

                            {% for item in itens %}

                            <div class="d-flex justify-content-between mb-2">
                                <span>
                                    {{ item.produto.nome }} x{{ item.quantidade }}
                                </span>

                                <strong>
                                    R$ {{ item.subtotal }}
                                </strong>
                            </div>

                            {% endfor %}

                            <hr>

                            <div class="d-flex justify-content-between">
                                <h5 class="fw-bold">Total:</h5>
                                <h5 class="fw-bold text-success">
                                    R$ {{ total }}
                                </h5>
                            </div>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 py-3 fw-bold">
                            ➡ Prosseguir para Pagamento PIX
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
