{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<style>
    /* CARD DE LOGIN */
    .auth-card input {
        border: 1px solid #cfcfcf;   /* borda visível sempre */
        border-radius: 10px;
        padding: 12px;
        background-color: #f8f9fa;   /* fundo levemente cinza */
        outline: none;
        transition: 0.2s;
    }

    /* quando clicar no campo */
    .auth-card input:focus {
        border: 1px solid #6c757d;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(108, 117, 125, 0.15);
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow p-4 auth-card" style="width: 420px; border-radius: 16px;">

        <h3 class="text-center mb-3">Login</h3>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger">
                    Usuário ou senha inválidos
                </div>
            {% endif %}

            <!-- USUÁRIO -->
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <!-- SENHA -->
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <!-- BOTÃO -->
            <button type="submit" class="btn btn-dark w-100">
                Entrar
            </button>

        </form>

        <p class="text-center mt-3">
            Não tem conta?
            <a href="{% url 'register' %}">Criar conta</a>
        </p>

    </div>

</div>

{% endblock %}
